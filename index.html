<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Cloud | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .success-glow { box-shadow: 0 0 20px rgba(34, 197, 94, 0.2); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen text-slate-200 antialiased p-6">
    
    <!-- Animated background subtle gradient -->
    <div class="fixed inset-0 -z-10 bg-[radial-gradient(circle_at_top_right,_var(--tw-gradient-stops))] from-blue-900/20 via-slate-950 to-slate-950"></div>

    <div class="w-full max-w-md space-y-8">
        <!-- Header -->
        <header class="text-center space-y-2">
            <h1 class="text-3xl font-light tracking-tight text-white">Network <span class="font-semibold text-blue-400">Node</span></h1>
            <p class="text-slate-400 text-sm uppercase tracking-widest font-medium">Personal Infrastructure</p>
        </header>

        <!-- Main Links -->
        <div class="grid gap-4">
            <!-- Immich -->
            <a href="https://immich.lacto.vip" target="_blank" 
               class="glass group flex items-center p-4 rounded-2xl transition-all duration-300 hover:scale-[1.02] hover:bg-slate-800/50 hover:border-blue-500/50">
                <div class="p-3 bg-blue-500/10 rounded-xl group-hover:bg-blue-500/20 transition-colors">
                    <i data-lucide="image" class="w-6 h-6 text-blue-400"></i>
                </div>
                <div class="ml-4">
                    <h2 class="text-lg font-medium text-white">Immich</h2>
                    <p class="text-xs text-slate-400">Photo & Video Gallery</p>
                </div>
                <i data-lucide="external-link" class="w-4 h-4 ml-auto text-slate-500 opacity-0 group-hover:opacity-100 transition-opacity"></i>
            </a>

            <!-- Jellyfin -->
            <a href="https://jellyfin.lacto.vip" target="_blank" 
               class="glass group flex items-center p-4 rounded-2xl transition-all duration-300 hover:scale-[1.02] hover:bg-slate-800/50 hover:border-purple-500/50">
                <div class="p-3 bg-purple-500/10 rounded-xl group-hover:bg-purple-500/20 transition-colors">
                    <i data-lucide="play" class="w-6 h-6 text-purple-400"></i>
                </div>
                <div class="ml-4">
                    <h2 class="text-lg font-medium text-white">Jellyfin</h2>
                    <p class="text-xs text-slate-400">Media Entertainment</p>
                </div>
                <i data-lucide="external-link" class="w-4 h-4 ml-auto text-slate-500 opacity-0 group-hover:opacity-100 transition-opacity"></i>
            </a>

            <!-- Minecraft (IP Copy) -->
            <button onclick="copyMCIP()" 
               class="glass group flex items-center w-full text-left p-4 rounded-2xl transition-all duration-300 hover:scale-[1.02] hover:bg-slate-800/50 hover:border-green-500/50 relative overflow-hidden">
                <div class="p-3 bg-green-500/10 rounded-xl group-hover:bg-green-500/20 transition-colors">
                    <i data-lucide="box" class="w-6 h-6 text-green-400"></i>
                </div>
                <div class="ml-4">
                    <h2 class="text-lg font-medium text-white">Minecraft</h2>
                    <p class="text-xs text-slate-400" id="mc-subtitle">Click to copy server IP</p>
                </div>
                <i data-lucide="copy" class="w-5 h-5 ml-auto text-slate-500 group-hover:text-green-400 transition-colors"></i>
            </button>
        </div>

        <!-- Footer -->
        <footer class="text-center">
            <p class="text-slate-600 text-[10px] uppercase tracking-tighter">System Status: Online</p>
        </footer>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 px-6 py-3 rounded-full bg-green-600 text-white font-medium text-sm opacity-0 transition-all duration-300 translate-y-4 pointer-events-none z-50">
        IP Copied to Clipboard!
    </div>

    <script>
        lucide.createIcons();

        // EDIT THIS: Your Minecraft Server URL/IP
        const MC_IP = "mc.lacto.vip";

        function copyMCIP() {
            navigator.clipboard.writeText(MC_IP).then(() => {
                const toast = document.getElementById('toast');
                const subtitle = document.getElementById('mc-subtitle');
                
                // Show Toast
                toast.classList.remove('opacity-0', 'translate-y-4');
                toast.classList.add('opacity-100', 'translate-y-0');
                
                // Change Subtitle temporarily
                subtitle.innerText = "Copied!";
                subtitle.classList.add('text-green-400');

                setTimeout(() => {
                    toast.classList.add('opacity-0', 'translate-y-4');
                    toast.classList.remove('opacity-100', 'translate-y-0');
                    subtitle.innerText = "Click to copy server IP";
                    subtitle.classList.remove('text-green-400');
                }, 2500);
            });
        }
    </script>
</body>
</html>
